<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>桃園市政府 動員準備業務訪評資料查詢</title>
<style>
  :root {
    --primary: #17517f;
    --primary-dark: #103a5e;
    --accent: #a85d1a;
    --accent-bg: #eef5fb;
    --surface: #ffffff;
    --surface-soft: #f7f3ea;
    --line: #d6e1eb;
    --text: #16202a;
    --muted: #5d6b78;
    --success: #1f7a4d;
    --danger: #b42318;
    --shadow: 0 12px 32px rgba(20, 43, 67, 0.1);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    background:
      linear-gradient(180deg, rgba(23, 81, 127, 0.08), rgba(247, 243, 234, 0.34) 42%, #f6f8fa),
      #f6f8fa;
    color: var(--text);
    font-size: 17px;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--primary), #26709f);
    color: #fff;
    padding: 16px;
    box-shadow: 0 2px 14px rgba(16, 58, 94, 0.18);
  }
  .masthead {
    max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 12px;
  }
  .emblem-mark {
    flex: 0 0 46px; height: 46px; border: 2px solid rgba(255,255,255,0.76);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 800; background: rgba(255,255,255,0.12);
  }
  header .title { font-size: 19px; font-weight: 700; }
  header .subtitle { font-size: 14px; margin-top: 4px; opacity: 0.9; }

  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #main-area { flex: 1; display: flex; flex-direction: column; max-width: 760px; margin: 0 auto; width: 100%; }

  /* ---- 通行碼閘門 ---- */
  #gate {
    padding: 34px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .gate-card {
    width: min(100%, 420px); background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 24px 22px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .gate-title { color: var(--primary); font-size: 20px; font-weight: 800; }
  #gate p { margin: 0; text-align: center; color: var(--muted); }
  #gate input {
    font-size: 20px; padding: 12px; width: 200px; text-align: center;
    letter-spacing: 4px; border: 2px solid var(--primary); border-radius: var(--radius);
    background: #fbfdff;
  }
  #gate button, .send-btn, .retry-btn {
    background: var(--primary); color: #fff; border: none; border-radius: var(--radius);
    padding: 12px 24px; font-size: 17px; font-weight: 700; cursor: pointer;
    box-shadow: 0 5px 12px rgba(23, 81, 127, 0.16);
  }
  #gate button:active, .send-btn:active { background: var(--primary-dark); }
  #gate button:disabled, .send-btn:disabled { background: #9fb3c8; cursor: not-allowed; box-shadow: none; }
  #gate-error { color: var(--danger); font-size: 15px; min-height: 22px; text-align: center; }

  /* ---- 快捷問題 ---- */
  #quick-questions {
    display: flex; gap: 9px; overflow-x: auto; padding: 12px 20px;
    background: rgba(255,255,255,0.92); border-bottom: 1px solid var(--line);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scroll-snap-type: x proximity;
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%);
    mask-image: linear-gradient(to right, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%);
  }
  .chip {
    flex: 0 0 auto; background: var(--accent-bg); color: var(--primary);
    border: 1px solid #c2d7ea; border-radius: 999px; padding: 8px 14px;
    font-size: 15px; white-space: nowrap; cursor: pointer;
    scroll-snap-align: start;
  }
  .chip:active { background: #dcebf7; }

  /* ---- 對話區 ---- */
  #chat { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 14px; }
  .bubble-row { display: flex; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.system { justify-content: flex-start; }
  .bubble {
    max-width: 85%; padding: 12px 16px; border-radius: var(--radius);
    box-shadow: 0 4px 18px rgba(21, 42, 62, 0.1);
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.user { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.system { background: #fff; color: var(--text); border: 1px solid #edf1f5; border-bottom-left-radius: 4px; }
  .bubble .tag { color: #1a6fd4; background: #e3edfb; padding: 0 4px; border-radius: 4px; font-weight: 600; }
  .bubble .contact-line { margin-top: 10px; font-size: 15px; color: var(--muted); }

  /* 復答徒章：徽章、內文分成狜立區塊，避免徽章與文字黏在一起 */
  .answer-badges { display: block; margin-bottom: 10px; }
  .answer-badges:empty { display: none; margin-bottom: 0; }
  .answer-badge {
    display: inline-block; font-size: 13px; font-weight: 600; padding: 3px 10px;
    border-radius: 999px; margin: 0 6px 6px 0;
  }
  .answer-badge.verified { background: #e4f5e8; color: var(--success); }
  .answer-badge.structured { background: #e3edfb; color: #1a6fd4; }
  .answer-badge.generated { background: #fff4e0; color: #9b5b08; }
  .answer-badge.demo { background: #fde8e6; color: var(--danger); }

  .answer-body .answer-para { margin: 0 0 10px; }
  .answer-body .answer-para:last-child { margin-bottom: 0; }
  .answer-sections { display: flex; flex-direction: column; gap: 10px; }
  .answer-section { display: flex; gap: 8px; align-items: flex-start; }
  .section-label {
    flex: 0 0 auto; font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    background: var(--accent-bg); color: var(--primary); white-space: nowrap; margin-top: 1px;
  }
  .section-label.label-出處 { background: #eaf5ec; color: var(--success); }
  .section-body { flex: 1; min-width: 0; }
  .page-anchor {
    display: inline-block; font-size: 13px; color: var(--muted); background: #f3f6f9;
    border: 1px solid var(--line); border-radius: 6px; padding: 1px 7px; margin: 0 2px;
  }

  .sources { max-width: 85%; display: flex; flex-direction: column; gap: 8px; margin-top: -4px; }
  .source-card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 10px 14px; font-size: 15px; box-shadow: 0 4px 14px rgba(21, 42, 62, 0.06);
  }
  .source-card .src-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .source-card .src-id {
    flex: 0 0 auto; font-size: 13px; font-weight: 700; color: var(--primary);
    background: var(--accent-bg); border-radius: 999px; padding: 2px 10px;
  }
  .source-card .src-bureau { flex: 0 0 auto; font-size: 13px; color: var(--muted); }
  .source-card .src-title { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .source-card .attach-btn {
    display: inline-block; margin-top: 6px; margin-right: 6px;
    background: var(--accent-bg); color: var(--primary); border: 1px solid #c7d9ef;
    border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; text-decoration: none;
  }

  .source-card .src-page {
    flex: 0 0 auto; font-size: 13px; color: #6b5313; background: #fdf3d8;
    border-radius: 999px; padding: 2px 10px; font-weight: 600;
  }
  .source-card .view-btn {
    display: inline-block; margin-top: 6px; margin-right: 6px;
    background: var(--primary); color: #fff; border: none;
    border-radius: 8px; padding: 6px 12px; font-size: 14px; cursor: pointer;
  }
  .cite-chip {
    display: inline-block; font-size: 13px; font-weight: 700; color: var(--primary);
    background: var(--accent-bg); border: 1px solid #c2d7ea; border-radius: 999px;
    padding: 0 8px; margin: 0 2px; cursor: pointer; vertical-align: 1px;
  }
  .cite-chip:active { background: #dcebf7; }

  /* ---- 原文檢視 modal ---- */
  #doc-modal {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(16, 32, 48, 0.55); padding: 24px 14px;
  }
  #doc-modal.open { display: flex; align-items: center; justify-content: center; }
  .doc-panel {
    background: #fff; border-radius: 14px; max-width: 720px; width: 100%;
    max-height: 86vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 24px 60px rgba(10, 25, 40, 0.35);
  }
  .doc-head {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .doc-head .doc-title { flex: 1; font-weight: 700; color: var(--primary); font-size: 17px; line-height: 1.5; }
  .doc-head .doc-close {
    flex: 0 0 auto; border: none; background: #eef2f6; border-radius: 8px;
    font-size: 16px; padding: 6px 12px; cursor: pointer; color: var(--text);
  }
  .doc-meta { padding: 10px 18px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  .doc-body {
    padding: 12px 18px 18px; overflow-y: auto; font-size: 16px; line-height: 1.8;
    white-space: pre-wrap; word-break: break-word; color: var(--text);
  }
  .doc-attach { padding: 0 18px 16px; }

  .typing { display: flex; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: #999;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  .slow-notice { font-size: 14px; color: #777; margin-top: 6px; }

  /* ---- 輸入區 ---- */
  #input-bar {
    display: flex; gap: 8px; padding: 10px 12px; background: rgba(255,255,255,0.95);
    border-top: 1px solid var(--line);
  }
  #question-input {
    flex: 1; font-size: 17px; padding: 12px; border: 1px solid #bdc9d5; border-radius: var(--radius);
    min-width: 0; background: #fff;
  }
  #question-input:disabled { background: #f0f0f0; }

  footer {
    text-align: center; font-size: 13px; color: var(--muted); padding: 10px;
    background: #fff; border-top: 1px solid #edf1f5;
  }

  #main-area.hidden { display: none; }
  #gate.hidden { display: none; }

  @media (max-width: 520px) {
    .masthead { align-items: flex-start; }
    .emblem-mark { flex-basis: 42px; height: 42px; }
    header .title { font-size: 18px; }
    .bubble, .sources { max-width: 92%; }
    #input-bar { position: sticky; bottom: 0; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="masthead">
      <div class="emblem-mark" aria-hidden="true">桃</div>
      <div>
        <div class="title">桃園市政府 動員準備業務訪評資料查詢</div>
        <div class="subtitle">本系統回覆均附資料出處，可點擊查閱原件</div>
      </div>
    </div>
  </header>

  <div id="gate">
    <div class="gate-card">
      <div class="gate-title">訪評資料查詢</div>
      <p>請輸入通行碼以開始使用</p>
      <input id="passcode-input" type="tel" inputmode="numeric" maxlength="6" placeholder="通行碼" aria-label="通行碼" autocomplete="one-time-code">
      <button id="gate-submit">進入系統</button>
      <div id="gate-error" aria-live="polite"></div>
    </div>
  </div>

  <div id="main-area" class="hidden">
    <div id="quick-questions"></div>
    <div id="chat" aria-live="polite"></div>
    <div id="input-bar">
      <input id="question-input" type="text" placeholder="請輸入您的問題…">
      <button id="send-btn" class="send-btn">送出</button>
    </div>
  </div>

  <footer>本系統由民政局建置｜回覆內容以紙本卷宗為準</footer>
</div>

<div id="doc-modal" role="dialog" aria-modal="true">
  <div class="doc-panel">
    <div class="doc-head">
      <div class="doc-title" id="doc-title"></div>
      <button class="doc-close" id="doc-close">✕ 關閉</button>
    </div>
    <div class="doc-meta" id="doc-meta"></div>
    <div class="doc-body" id="doc-body"></div>
    <div class="doc-attach" id="doc-attach"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ==== 部署時請把下面這行換成你的 GAS Web App URL ====
  var GAS_URL = 'https://script.google.com/macros/s/AKfycby0VJPC8jWejA4pQxSQsGYBxiGwIZKIb13fghpf_MexCRI-EXmiBUFD2uUcCZGJRZV_/exec';

  var QUICK_QUESTIONS = [
    '上次訪評缺失改進情形',
    '民安10號演習辦理重點',
    '替代役運用情形',
    '動員預算編列情形',
    '防空避難設施整備情形',
    '動員編管資料資訊化建置情形',
    '各局處橫向統合辦理情形',
    '創新作為與特殊事蹟'
  ];

  var sessionId = null;
  var passcode = null;
  var waiting = false;
  var failCount = 0;
  var lockUntil = 0;
  var pendingQuestion = getQueryQuestion();

  var gateEl = document.getElementById('gate');
  var gateError = document.getElementById('gate-error');
  var passcodeInput = document.getElementById('passcode-input');
  var gateSubmit = document.getElementById('gate-submit');
  var mainArea = document.getElementById('main-area');
  var chatEl = document.getElementById('chat');
  var questionInput = document.getElementById('question-input');
  var sendBtn = document.getElementById('send-btn');
  var quickEl = document.getElementById('quick-questions');

  function getQueryQuestion() {
    try {
      return new URLSearchParams(window.location.search).get('q') || '';
    } catch (err) {
      return '';
    }
  }

  function getSessionId() {
    var sid = sessionStorage.getItem('sessionId');
    if (!sid) {
      sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
        : ('sid-' + Date.now() + '-' + Math.random().toString(16).slice(2));
      sessionStorage.setItem('sessionId', sid);
    }
    return sid;
  }

  function renderQuickQuestions() {
    quickEl.innerHTML = '';
    QUICK_QUESTIONS.forEach(function (q) {
      var chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = q;
      chip.addEventListener('click', function () {
        if (waiting) return;
        questionInput.value = q;
        sendQuestion();
      });
      quickEl.appendChild(chip);
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ==== 出處人話化 ====
  var TABLE_NAMES = {
    '全動': '動員準備業務會報',
    '精神': '精神動員準備',
    '人力': '人力動員準備',
    '物資': '物資經濟動員準備',
    '交通': '交通動員準備',
    '衛生': '衛生動員準備',
    '科技': '科技動員準備',
    '軍事': '軍事動員準備'
  };

  // 最近一次回答的出處資料，供引用晶片與 modal 使用
  var sourceRegistry = {};

  function friendlyName(id) {
    var m = String(id || '').match(/^([^-]+)-0*(\d+)/);
    if (!m) return String(id || '');
    var table = TABLE_NAMES[m[1]] || m[1];
    return table + '｜第' + Number(m[2]) + '項';
  }

  /** 模型偶爾殘留 Markdown 記號，介面不渲染 Markdown，先清掉 */
  function cleanupMarkdown(text) {
    return String(text || '')
      .replace(/\*\*([^*\n]+)\*\*/g, '$1')
      .replace(/^#{1,6}\s*/gm, '')
      .replace(/^[ \t]*[\*\-•]\s+/gm, '‧ ')
      .replace(/\n{3,}/g, '\n\n');
  }

  function decorateInline(text) {
    var escaped = escapeHtml(text);
    escaped = escaped.replace(/（紙本頁碼[：:][^）]*）/g, function (m) {
      return '<span class="page-anchor">' + m.replace(/[（）]/g, '') + '</span>';
    });
    escaped = escaped.replace(/【([^】｜|]+)(?:[｜|][^】]*)?】/g, function (m, id) {
      id = id.trim();
      if (sourceRegistry[id]) {
        return '<span class="cite-chip" data-src-id="' + escapeHtml(id) + '">📄 '
          + escapeHtml(friendlyName(id)) + '</span>';
      }
      return '<span class="tag">' + m + '</span>';
    });
    return escaped;
  }

  /**
   * 將後端回覆文字排版：
   * - 若包含「結論：/依據：/出處：」三段式標籤，分段顯示並加上彩色標籤
   * - 否則依段落分別包裝，避免一大塊文字雜在一起
   */
  function formatAnswerHtml(rawText) {
    var lines = cleanupMarkdown(rawText).split(/\n+/).map(function (l) { return l.trim(); }).filter(Boolean);
    if (!lines.length) return '';
    var sectionRe = /^(結論|依據|出處)[：:]\s*(.*)$/;
    var sections = [];
    var plain = [];
    lines.forEach(function (line) {
      var m = line.match(sectionRe);
      if (m) sections.push({ label: m[1], body: m[2] }); else plain.push(line);
    });
    if (sections.length) {
      return '<div class="answer-sections">' + sections.map(function (s) {
        return '<div class="answer-section"><span class="section-label label-' + s.label + '">' + s.label + '</span>' +
          '<span class="section-body">' + decorateInline(s.body) + '</span></div>';
      }).join('') + '</div>';
    }
    return plain.map(function (p) { return '<p class="answer-para">' + decorateInline(p) + '</p>'; }).join('');
  }

  // ==== 原文檢視 modal ====
  var docModal = document.getElementById('doc-modal');
  var docTitle = document.getElementById('doc-title');
  var docMeta = document.getElementById('doc-meta');
  var docBody = document.getElementById('doc-body');
  var docAttach = document.getElementById('doc-attach');

  function openDocModal(src) {
    if (!src) return;
    docTitle.textContent = '📄 ' + friendlyName(src.id);
    docMeta.innerHTML = '';
    if (src.pageRef) {
      var page = document.createElement('span');
      page.className = 'src-page';
      page.textContent = '紙本卷宗 ' + src.pageRef;
      docMeta.appendChild(page);
    }
    if (src.bureau) {
      var bureau = document.createElement('span');
      bureau.className = 'src-bureau';
      bureau.textContent = '主辦：' + src.bureau;
      docMeta.appendChild(bureau);
    }
    var idNote = document.createElement('span');
    idNote.className = 'src-bureau';
    idNote.textContent = '項目代號 ' + src.id;
    docMeta.appendChild(idNote);

    var body = '';
    if (src.title) body += '檢核重點：' + src.title + '\n\n';
    body += src.fullText || '（本項原文未收錄於系統，請參閱紙本卷宗' + (src.pageRef ? ' ' + src.pageRef : '') + '）';
    docBody.textContent = body;

    docAttach.innerHTML = '';
    (src.attachments || []).forEach(function (a) {
      if (!a.url) return;
      var btn = document.createElement('a');
      btn.className = 'attach-btn';
      btn.href = a.url;
      btn.target = '_blank';
      btn.rel = 'noopener noreferrer';
      btn.textContent = '📎 ' + (a.name || '附件');
      docAttach.appendChild(btn);
    });
    docModal.classList.add('open');
  }

  document.getElementById('doc-close').addEventListener('click', function () {
    docModal.classList.remove('open');
  });
  docModal.addEventListener('click', function (e) {
    if (e.target === docModal) docModal.classList.remove('open');
  });

  // 引用晶片：事件委派（回答氣泡是 innerHTML 動態產生）
  document.addEventListener('click', function (e) {
    var chip = e.target.closest ? e.target.closest('.cite-chip') : null;
    if (chip) openDocModal(sourceRegistry[chip.getAttribute('data-src-id')]);
  });

  function addUserBubble(text) {
    var row = document.createElement('div');
    row.className = 'bubble-row user';
    var bubble = document.createElement('div');
    bubble.className = 'bubble user';
    bubble.textContent = text;
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addSystemBubble(html) {
    var row = document.createElement('div');
    row.className = 'bubble-row system';
    var bubble = document.createElement('div');
    bubble.className = 'bubble system';
    bubble.innerHTML = html;
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return row;
  }

  function addSourceCards(sources) {
    if (!sources || !sources.length) return;
    var wrap = document.createElement('div');
    wrap.className = 'sources';
    sources.forEach(function (s) {
      var card = document.createElement('div');
      card.className = 'source-card';
      var head = document.createElement('div');
      head.className = 'src-head';
      var idBadge = document.createElement('span');
      idBadge.className = 'src-id';
      idBadge.textContent = '📄 ' + friendlyName(s.id);
      head.appendChild(idBadge);
      if (s.pageRef) {
        var page = document.createElement('span');
        page.className = 'src-page';
        page.textContent = '紙本 ' + s.pageRef;
        head.appendChild(page);
      }
      if (s.bureau) {
        var bureau = document.createElement('span');
        bureau.className = 'src-bureau';
        bureau.textContent = s.bureau;
        head.appendChild(bureau);
      }
      card.appendChild(head);
      if (s.title) {
        var title = document.createElement('div');
        title.className = 'src-title';
        title.textContent = s.title;
        card.appendChild(title);
      }
      if (s.fullText) {
        var viewBtn = document.createElement('button');
        viewBtn.className = 'view-btn';
        viewBtn.textContent = '🔎 查看原文';
        viewBtn.addEventListener('click', function () { openDocModal(s); });
        card.appendChild(viewBtn);
      }
      (s.attachments || []).forEach(function (a) {
        if (!a.url) return;
        var btn = document.createElement('a');
        btn.className = 'attach-btn';
        btn.href = a.url;
        btn.target = '_blank';
        btn.rel = 'noopener noreferrer';
        btn.textContent = '📎 開啟附件：' + (a.name || '附件');
        card.appendChild(btn);
      });
      wrap.appendChild(card);
    });
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addTypingIndicator() {
    var row = document.createElement('div');
    row.className = 'bubble-row system';
    row.id = 'typing-row';
    var bubble = document.createElement('div');
    bubble.className = 'bubble system';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return row;
  }

  function removeTypingIndicator() {
    var row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  function setInputEnabled(enabled) {
    waiting = !enabled;
    questionInput.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  function callApi(body) {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    }).then(function (res) {
      if (!res.ok) throw new Error('http-error');
      return res.json();
    });
  }

  function answerBadgeHtml(answerType) {
    if (answerType === 'cache') {
      return '<div class="answer-badge verified">✅ 已人工驗證答案，可直接引用</div>';
    }
    if (answerType === 'structured') {
      return '<div class="answer-badge structured">🔢 系統直接讀取原文數值，非AI生成</div>';
    }
    if (answerType === 'generated') {
      return '<div class="answer-badge generated">⚠️ AI 依資料即時生成，正式引用請以原文／佐證文件為準</div>';
    }
    return '';
  }

  function hasDemoSource(sources) {
    return (sources || []).some(function (source) {
      return String(source.id || '').indexOf('DEMO-') === 0 || String(source.title || '').indexOf('示範') !== -1;
    });
  }

  function renderAnswer(data) {
    // 先登錄出處，讓回答內文的【出處】能轉成可點晶片
    (data.sources || []).forEach(function (s) { sourceRegistry[s.id] = s; });
    var demoNotice = hasDemoSource(data.sources)
      ? '<span class="answer-badge demo">目前後端仍連到 DEMO 示範資料，請先匯入正式 Google Sheet 後再使用</span>'
      : '';
    var badges = '<div class="answer-badges">' + demoNotice + answerBadgeHtml(data.answerType) + '</div>';
    var body = '<div class="answer-body">' + formatAnswerHtml(data.answer || '') + '</div>';
    var contact = (data.answerType === 'none' && data.contact)
      ? '<div class="contact-line">📞 建議洽詢：' + escapeHtml(data.contact) + '</div>'
      : '';
    addSystemBubble(badges + body + contact);
    addSourceCards(data.sources);
  }

  function renderConnectionError(originalQuestion) {
    var row = addSystemBubble('系統暫時無法連線，請洽工作人員或參閱紙本卷宗。');
    var retryBtn = document.createElement('button');
    retryBtn.className = 'retry-btn';
    retryBtn.textContent = '重試';
    retryBtn.style.marginTop = '8px';
    retryBtn.addEventListener('click', function () {
      row.remove();
      questionInput.value = originalQuestion;
      sendQuestion();
    });
    row.querySelector('.bubble').appendChild(document.createElement('br'));
    row.querySelector('.bubble').appendChild(retryBtn);
  }

  function sendQuestion() {
    var text = questionInput.value.trim();
    if (!text || waiting) return;

    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR_GAS_WEB_APP_URL_HERE') !== -1) {
      addSystemBubble('系統尚未設定後端連線位址，請洽系統管理者完成部署設定。');
      return;
    }

    addUserBubble(text);
    questionInput.value = '';
    setInputEnabled(false);

    var typingRow = addTypingIndicator();
    var slowTimer = setTimeout(function () {
      var bubble = typingRow.querySelector('.bubble');
      if (bubble && !bubble.querySelector('.slow-notice')) {
        var notice = document.createElement('div');
        notice.className = 'slow-notice';
        notice.textContent = '資料查詢中，請稍候…';
        bubble.appendChild(notice);
      }
    }, 8000);

    callApi({ action: 'ask', passcode: passcode, sessionId: sessionId, question: text })
      .then(function (data) {
        clearTimeout(slowTimer);
        removeTypingIndicator();
        setInputEnabled(true);
        if (!data.ok) {
          addSystemBubble(escapeHtml(data.message || '系統暫時無法連線，請洽工作人員或參閱紙本卷宗。'));
          return;
        }
        renderAnswer(data);
      })
      .catch(function () {
        clearTimeout(slowTimer);
        removeTypingIndicator();
        setInputEnabled(true);
        renderConnectionError(text);
      });
  }

  function tryEnter() {
    var now = Date.now();
    if (now < lockUntil) {
      var secs = Math.ceil((lockUntil - now) / 1000);
      gateError.textContent = '嘗試次數過多，請等待 ' + secs + ' 秒後再試。';
      return;
    }
    var code = passcodeInput.value.trim();
    if (!code) { gateError.textContent = '請輸入通行碼。'; return; }

    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR_GAS_WEB_APP_URL_HERE') !== -1) {
      gateError.textContent = '系統尚未設定後端連線位址，請洽系統管理者完成部署設定。';
      return;
    }

    gateSubmit.disabled = true;
    gateError.textContent = '驗證中…';
    var sid = getSessionId();
    callApi({ action: 'verify', passcode: code, sessionId: sid })
      .then(function (data) {
        gateSubmit.disabled = false;
        if (!data.ok) {
          failCount++;
          gateError.textContent = '通行碼錯誤（' + failCount + '/3）。';
          if (failCount >= 3) {
            lockUntil = Date.now() + 60000;
            gateError.textContent = '嘗試次數過多，請等待 60 秒後再試。';
            failCount = 0;
          }
          return;
        }
        if (data.maintenance) {
          gateError.textContent = data.announcement || '系統維護中，請稍後再試。';
          return;
        }
        passcode = code;
        sessionId = sid;
        gateEl.classList.add('hidden');
        mainArea.classList.remove('hidden');
        renderQuickQuestions();
        if (pendingQuestion) {
          questionInput.value = pendingQuestion;
          pendingQuestion = '';
          sendQuestion();
        } else {
          questionInput.focus();
        }
      })
      .catch(function () {
        gateSubmit.disabled = false;
        gateError.textContent = '系統暫時無法連線，請洽工作人員或參閱紙本卷宗。';
      });
  }

  gateSubmit.addEventListener('click', tryEnter);
  passcodeInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryEnter();
  });

  sendBtn.addEventListener('click', sendQuestion);
  questionInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') sendQuestion();
  });

  document.getElementById('gate').classList.remove('hidden');
})();
</script>
</body>
</html>
